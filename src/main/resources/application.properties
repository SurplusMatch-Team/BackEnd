spring.application.name=surplusmatch

# Veritabanı Ayarları
spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.username=root

# Burası sihirli kısım: Eğer bilgisayarda DB_PASSWORD diye bir değişken varsa onu kullan, 
# yoksa varsayılan olarak senin şifreni (h4n1f3.K) kullan.
spring.datasource.password=${DB_PASSWORD:h4n1f3.K}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Ayarları
# Muhammet 'create' demiş (her şeyi siler), biz 'update' diyoruz (verileri korur). Senin dediğin kalsın.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Port Ayarı: 8082 meşgulse senin için 8085 çalışsın.
server.port=${SERVER_PORT:8085}