spring.application.name=surplus-match

# Enable H2 Console so we can see the data in our browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Database Connection Settings
spring.datasource.url=jdbc:h2:mem:surplusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show the SQL queries in the console (so we can see what Spring is doing)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update